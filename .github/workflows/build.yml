name: Build OpenWrt for Cudy WR3000V2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-hours: 6
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        
      - name: Clone LEDE source
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede.git lede
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Configure build
        run: |
          cd lede
          cat > .config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_DEVICE_mediatek_filogic=y
# Cudy WR3000V2 (MT7981) - Generic filogic build
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-app-opkg=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_wpad-openssl=y
EOF
          make defconfig
          
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache flex bison gawk \
            libncurses5-dev libssl-dev zlib1g-dev libelf-dev \
            autoconf automake libtool pkg-config
            
      - name: Download sources
        run: |
          cd lede
          make download -j8
        timeout-minutes: 30
          
      - name: Build firmware
        run: |
          cd lede
          make V=s -j$(nproc)
        timeout-hours: 5
          
      - name: List output files
        run: |
          ls -la lede/bin/targets/mediatek/filogic/
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-cudy-wr3000v2
          path: |
            lede/bin/targets/mediatek/filogic/*
            lede/bin/targets/mediatek/filogic/**/*.bin
          retention-days: 7
