name: Build OpenWrt for Cudy WR3000 V2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        
      - name: Clone LEDE source
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede.git lede
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Copy config file
        run: |
          cd lede
          cp ../.config .config
          make defconfig
          
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache flex bison gawk libncurses5-dev libssl-dev zlib1g-dev libelf-dev autoconf automake libtool pkg-config

      - name: Download sources
        run: |
          cd lede
          make download -j8
        timeout-minutes: 30
        
      - name: Build firmware
        run: |
          cd lede
          make V=s -j$(nproc)
        timeout-minutes: 300
        
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-cudy-wr3000v2
          path: lede/bin/targets/mediatek/filogic/
          retention-days: 7
